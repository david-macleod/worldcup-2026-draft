name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @wc/web build

      - name: Apply D1 migrations
        run: pnpm --filter @wc/api exec wrangler d1 migrations apply worldcup --remote --env production

      - name: Deploy worker
        run: pnpm --filter @wc/api exec wrangler deploy --env production
