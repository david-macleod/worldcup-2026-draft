name = "worldcup-2026"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Worker serves the built React app (packages/web/dist) through the ASSETS binding.
# run_worker_first = true so /api/* always hits the Worker; everything else the
# Worker delegates to env.ASSETS.fetch (SPA fallback handled there).
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "worldcup"
database_id = "e96addac-83d6-49b4-a1e5-15ca93700aa6"
migrations_dir = "migrations"

# Production deploy target (set the real database_id after `wrangler d1 create`).
[env.production]
routes = [
  { pattern = "worldcup.macleod.in", custom_domain = true }
]
[[env.production.d1_databases]]
binding = "DB"
database_name = "worldcup"
database_id = "e96addac-83d6-49b4-a1e5-15ca93700aa6"
migrations_dir = "migrations"

[env.production.assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
